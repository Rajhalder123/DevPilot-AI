version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: devpilot-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=devpilot
    networks:
      - devpilot-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devpilot-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/devpilot
      - JWT_SECRET=${JWT_SECRET:-devpilot-secret-change-me}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL:-http://localhost:5000/api/auth/github/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - devpilot-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devpilot-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:5000
    networks:
      - devpilot-network

volumes:
  mongo_data:
  uploads_data:


networks:
  devpilot-network:
    driver: bridge
